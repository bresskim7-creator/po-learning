// STT 결과 저장
let sttRecognition = null;
let sttResult = '';
let sttConfidence = 0;
let sttActive = false;

function startSTT(lang, onAutoResult) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn('[STT] Web Speech API 미지원');
    return;
  }

  sttResult = '';
  sttConfidence = 0;
  sttActive = true;

  sttRecognition = new SpeechRecognition();
  sttRecognition.lang = lang || 'ko-KR';
  sttRecognition.interimResults = false;
  sttRecognition.maxAlternatives = 1;
  sttRecognition.continuous = false;

  sttRecognition.onresult = function(event) {
    var r = event.results[0][0];
    sttResult = r.transcript || '';
    sttConfidence = r.confidence || 0;
    console.log('[STT] 결과:', sttResult, '신뢰도:', sttConfidence);
    if (onAutoResult) onAutoResult();
  };

  sttRecognition.onerror = function(event) {
    console.warn('[STT오류]', event.error, '| 상세:', event.message || '없음');
    sttResult = '';
    sttConfidence = 0;
  };

  sttRecognition.onend = function() {
    sttActive = false;
    if (onAutoResult && sttResult === '') onAutoResult();
  };

  sttRecognition.start();
  console.log('[STT] 시작');
}

function stopSTT() {
  if (sttRecognition && sttActive) {
    try { sttRecognition.stop(); } catch(e) {}
  }
  sttActive = false;
}

/**
 * 문장 일치도 판정 (규칙 기반)
 * @param {string} target - 원문 (ttsText)
 * @param {string} spoken - STT 결과
 * @param {number} sttConf - STT 신뢰도 (0~1)
 * @returns {{ level: 'match'|'ambiguous'|'mismatch', score: number }}
 */
function assessMatch(target, spoken, sttConf) {
  if (!spoken || spoken.trim() === '') {
    return { level: 'mismatch', score: 0 };
  }

  // 정규화: 공백, 구두점 제거, 소문자
  function normalize(s) {
    return s.replace(/[.,!?~…·\-\s]/g, '').toLowerCase().replace(/[ㅋㅎㅠㅜ]/g, '');
  }

  var norm_target = normalize(target);
  var norm_spoken = normalize(spoken);

  if (norm_target === '' || norm_spoken === '') {
    return { level: 'mismatch', score: 0 };
  }

  // 글자 단위 일치율 (Levenshtein 대신 간단한 방식)
  var longer = norm_target.length >= norm_spoken.length ? norm_target : norm_spoken;
  var shorter = norm_target.length >= norm_spoken.length ? norm_spoken : norm_target;

  // 연속 일치 부분문자열 기반 점수
  var matchCount = 0;
  var usedIdx = new Set();
  for (var i = 0; i < shorter.length; i++) {
    for (var j = 0; j < longer.length; j++) {
      if (!usedIdx.has(j) && shorter[i] === longer[j]) {
        matchCount++;
        usedIdx.add(j);
        break;
      }
    }
  }
  var charScore = matchCount / longer.length;

  // 단어 단위 일치율
  var targetWords = target.trim().split(/\s+/);
  var spokenWords = spoken.trim().split(/\s+/);
  var wordMatch = 0;
  spokenWords.forEach(function(w) {
    if (targetWords.indexOf(w) >= 0) wordMatch++;
  });
  var wordScore = targetWords.length > 0 ? wordMatch / targetWords.length : 0;

  // 종합 점수 (글자 60% + 단어 40%)
  var score = charScore * 0.6 + wordScore * 0.4;

  // STT 신뢰도가 낮으면 ambiguous 쪽으로
  if (sttConf < 0.5) {
    score = Math.min(score, 0.6);
  }

  // 판정
  if (score >= 0.7) return { level: 'match', score: score };
  if (score >= 0.4) return { level: 'ambiguous', score: score };
  return { level: 'mismatch', score: score };
}

// 듣고 말하기 전용 판정 (완화된 기준)
// - STT 신뢰도 페널티 제거 (청각기억 훈련이므로 STT 오류에 관대)
// - 단어 단위 매칭 비중 확대 (글자 하나 틀려도 뜻 맞으면 OK)
// - ambiguous도 match로 처리 (일부만 기억해도 인정)
function assessMatchLR(target, spoken, sttConf) {
  if (!spoken || spoken.trim() === '') {
    return { level: 'mismatch', score: 0 };
  }

  function normalize(s) {
    return s.replace(/[.,!?~…·\-\s]/g, '').toLowerCase().replace(/[ㅋㅎㅠㅜ]/g, '');
  }

  var norm_target = normalize(target);
  var norm_spoken = normalize(spoken);

  if (norm_target === '' || norm_spoken === '') {
    return { level: 'mismatch', score: 0 };
  }

  // 글자 단위 일치율
  var longer = norm_target.length >= norm_spoken.length ? norm_target : norm_spoken;
  var shorter = norm_target.length >= norm_spoken.length ? norm_spoken : norm_target;
  var matchCount = 0;
  var usedIdx = new Set();
  for (var i = 0; i < shorter.length; i++) {
    for (var j = 0; j < longer.length; j++) {
      if (!usedIdx.has(j) && shorter[i] === longer[j]) {
        matchCount++;
        usedIdx.add(j);
        break;
      }
    }
  }
  var charScore = matchCount / longer.length;

  // 단어 단위 일치율
  var targetWords = target.trim().split(/\s+/);
  var spokenWords = spoken.trim().split(/\s+/);
  var wordMatch = 0;
  spokenWords.forEach(function(w) {
    var nw = normalize(w);
    for (var t = 0; t < targetWords.length; t++) {
      var nt = normalize(targetWords[t]);
      // 부분 일치도 인정 (3글자 이상 겹치면)
      if (nw === nt || (nw.length >= 3 && nt.includes(nw)) || (nt.length >= 3 && nw.includes(nt))) {
        wordMatch++;
        break;
      }
    }
  });
  var wordScore = targetWords.length > 0 ? wordMatch / targetWords.length : 0;

  // 종합 점수: 단어 비중 높임 (글자 40% + 단어 60%)
  // STT 신뢰도 페널티 없음 (아이 음성은 신뢰도 낮은 게 정상)
  var score = charScore * 0.4 + wordScore * 0.6;

  // 판정 기준 완화: 0.45 이상이면 match
  if (score >= 0.45) return { level: 'match', score: score };
  if (score >= 0.25) return { level: 'ambiguous', score: score };
  return { level: 'mismatch', score: score };
}

// 녹음 (언어치료 마이크로 루틴)
// ===================================================================

let mediaRecorder = null;
let recordingChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;

async function toggleRecording() {
  const btn = document.getElementById('btn-record');
  const status = document.getElementById('recording-status');
  const timerEl = document.getElementById('recording-timer');

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    // 녹음 중지
    mediaRecorder.stop();
    stopSTT();  // v4.5: STT 중지
    btn.classList.remove('recording');
    clearInterval(recordingTimer);
    timerEl.classList.add('hidden');

    var card = APP.session.cards[APP.session.currentIndex];

    // v4.3: 관찰 데이터 — 녹음 기록
    if (card && card._observation) {
      card._observation.attemptNumber++;
      card._observation.recordingDurations.push(recordingSeconds);
      card._attemptNumber = card._observation.attemptNumber;
    }

    logEvent('recording_save', {
      cardId: card ? card.id : null,
      duration: recordingSeconds,
    });

    // ★ v4.5: STT 결과 대기 후 일치도 판정
    // STT onresult가 비동기이므로 짧은 대기 후 판정
    setTimeout(function() {
      var targetText = card.question.ttsText || card.question.displayWord || '';
      var match = assessMatch(targetText, sttResult, sttConfidence);
      var attemptNum = card._observation ? card._observation.attemptNumber : 1;
      var consecutiveMismatch = card._consecutiveMismatch || 0;

      // v4.5: STT 관찰 데이터 기록
      if (card._observation) {
        if (!card._observation.sttResults) card._observation.sttResults = [];
        card._observation.sttResults.push({
          spoken: sttResult,
          confidence: sttConfidence,
          matchLevel: match.level,
          matchScore: match.score
        });
      }

      logEvent('stt_match', {
        cardId: card.id,
        target: targetText,
        spoken: sttResult,
        sttConfidence: sttConfidence,
        matchLevel: match.level,
        matchScore: match.score,
        attempt: attemptNum
      });

      var feedbackEl = document.getElementById('recording-feedback');
      var btnListen = document.getElementById('btn-listen');
      var btnRetry = document.getElementById('btn-retry');

      if (match.level === 'match') {
        // ✅ 거의 일치 → 칭찬
        card._consecutiveMismatch = 0;
        if (feedbackEl) {
          var praiseTexts = ['잘했어!', '잘 읽었어!', '멋지다!', '대단해!', '좋아!'];
          var praise = praiseTexts[Math.floor(Math.random() * praiseTexts.length)];
          feedbackEl.textContent = praise;
          feedbackEl.classList.remove('hidden');
        }
        status.textContent = '녹음 저장됐어!';
        if (btnListen) btnListen.classList.remove('hidden');
        // 다음으로 버튼
        if (!document.getElementById('btn-next-card')) {
          var nextArea = document.createElement('div');
          nextArea.innerHTML = '<button id="btn-next-card" class="btn-stair" onclick="finishRecordingCard()" style="margin-top:8px;">다음으로 →</button>';
          status.parentNode.appendChild(nextArea);
        }

      } else if (match.level === 'ambiguous') {
        // ⚠️ 애매함 → 재시도 유도 (정오 판정 금지)
        consecutiveMismatch++;
        card._consecutiveMismatch = consecutiveMismatch;

        if (feedbackEl) {
          feedbackEl.textContent = '한 번 더 들어보고 천천히 읽어볼까?';
          feedbackEl.classList.remove('hidden');
        }
        status.textContent = '';
        if (btnListen) btnListen.classList.remove('hidden');
        if (btnRetry) btnRetry.classList.remove('hidden');
        // 다음으로 버튼도 표시 (강제 안 함)
        if (!document.getElementById('btn-next-card')) {
          var nextArea2 = document.createElement('div');
          nextArea2.innerHTML = '<button id="btn-next-card" class="btn-stair" onclick="finishRecordingCard()" style="margin-top:8px;opacity:0.6;">다음으로 →</button>';
          status.parentNode.appendChild(nextArea2);
        }

      } else {
        // ❌ 불일치
        consecutiveMismatch++;
        card._consecutiveMismatch = consecutiveMismatch;

        if (consecutiveMismatch >= 3) {
          // 3회 연속 불일치 → 카드 종료 (보류, 실패 아님)
          if (feedbackEl) {
            feedbackEl.textContent = '괜찮아! 다음에 또 해보자.';
            feedbackEl.classList.remove('hidden');
          }
          status.textContent = '';
          card._sttPending = true;  // 부모 화면용 마킹

          logEvent('stt_card_pending', {
            cardId: card.id,
            attempts: attemptNum,
            consecutiveMismatch: consecutiveMismatch
          });

          // 2초 후 자동으로 다음 카드
          setTimeout(function() {
            finishRecordingCard();
          }, 2000);

        } else if (consecutiveMismatch === 2) {
          // 2회 연속 불일치 → "한 번 더 해볼까?" + 녹음 저장
          if (feedbackEl) {
            feedbackEl.textContent = '한 번 더 해볼까?';
            feedbackEl.classList.remove('hidden');
          }
          status.textContent = '녹음은 저장됐어!';
          if (btnListen) btnListen.classList.remove('hidden');
          if (btnRetry) btnRetry.classList.remove('hidden');

        } else {
          // 1회 불일치 → 정오 판정 금지, 다시 듣기 유도
          if (feedbackEl) {
            feedbackEl.textContent = '다시 한번 들어볼까?';
            feedbackEl.classList.remove('hidden');
          }
          status.textContent = '';
          if (btnListen) btnListen.classList.remove('hidden');
          if (btnRetry) btnRetry.classList.remove('hidden');
        }
      }
    }, 500);  // STT 결과 수신 대기 500ms

    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
    });

    recordingChunks = [];
    recordingSeconds = 0;

    var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

    mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) recordingChunks.push(e.data);
    };

    mediaRecorder.onstop = async function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      var blob = new Blob(recordingChunks, { type: 'audio/webm' });
      console.log('[PO] 녹음 완료:', blob.size, 'bytes');

      // ★ 즉시 Base64 변환 (Blob 메모리 해제 방지)
      var base64Data = null;
      try {
        base64Data = await blobToBase64(blob);
        console.log('[PO] Base64 변환 성공, 길이:', base64Data ? base64Data.length : 0);
      } catch (e) {
        console.warn('[PO] Base64 즉시 변환 실패:', e);
      }

      var card = APP.session.cards[APP.session.currentIndex];
      if (card && APP.session.recordings) {
        var dateStr = new Date().toISOString().split('T')[0];
        var seqNum = String(APP.session.recordings.length + 1).padStart(2, '0');
        var activityType = 'ST';
        var ruleTag = card._ruleTag || '';
        var targetWord = (card.question.ttsText || card.question.displayWord || '').replace(/[^가-힣a-zA-Z0-9]/g, '').substring(0, 20);
        var filename = dateStr + '_PO_' + activityType + '_' + ruleTag + '_' + targetWord + '_' + seqNum + '.webm';

        APP.session.recordings.push({
          base64: base64Data,  // ★ Blob 대신 Base64 문자열 저장
          filename: filename,
          timestamp: new Date().toISOString(),
          activityType: activityType,
          ruleTag: ruleTag,
          targetWord: card.question.ttsText || card.question.displayWord || '',
          durationSec: recordingSeconds,
          cardId: card.id,
          helpStairsUsed: card._helpStairsUsed || [],
          attemptNumber: card._attemptNumber || 1
        });
        console.log('[PO] 녹음 저장 완료, 총', APP.session.recordings.length, '건');
      }
    };

    mediaRecorder.start();
    btn.classList.add('recording');
    status.textContent = '녹음 중... 다 읽으면 버튼을 다시 눌러';
    timerEl.classList.remove('hidden');

    // v4.5: 녹음과 동시에 STT 시작
    var card = APP.session.cards[APP.session.currentIndex];
    var sttLang = (card && card.question && card.question.ttsText &&
      /^[a-zA-Z\s.,!?'"]+$/.test(card.question.ttsText)) ? 'en-US' : 'ko-KR';
    startSTT(sttLang);

    recordingTimer = setInterval(function() {
      recordingSeconds++;
      var min = Math.floor(recordingSeconds / 60);
      var sec = recordingSeconds % 60;
      timerEl.textContent = min + ':' + String(sec).padStart(2, '0');
    }, 1000);
  } catch (e) {
    status.textContent = '마이크를 사용할 수 없어요';
    console.error('녹음 실패:', e);
  }
}

// 녹음 완료 후 다음 카드로 이동
function finishRecordingCard() {
  var card = APP.session.cards[APP.session.currentIndex];
  // v4.3: 관찰 완료 로그
  if (card && card._observation) {
    logEvent('observation_complete', {
      cardId: card.id,
      helpStairs: card._observation.helpStairsUsed,
      attempts: card._observation.attemptNumber,
      listens: card._observation.listenCount,
      skipped: false,
      timeOnCard: Math.round((Date.now() - card._observation.cardStartTime) / 1000),
      recordingDurations: card._observation.recordingDurations
    });
  }
  APP.session.currentIndex++;
  renderCard();
}

function skipRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    clearInterval(recordingTimer);
  }
  var card = APP.session.cards[APP.session.currentIndex];
  // v4.3: 관찰 데이터 — 건너뛰기 기록
  if (card && card._observation) {
    card._observation.skipped = true;
    logEvent('observation_complete', {
      cardId: card.id,
      helpStairs: card._observation.helpStairsUsed,
      attempts: card._observation.attemptNumber,
      listens: card._observation.listenCount,
      skipped: true,
      timeOnCard: Math.round((Date.now() - card._observation.cardStartTime) / 1000),
      recordingDurations: card._observation.recordingDurations
    });
  }
  logEvent('card_skip', { cardId: card ? card.id : null });
  APP.session.currentIndex++;
  renderCard();
}

// 전역 상태
var lrState = {
  cards: [],
  currentIndex: 0,
  currentStage: 1,
  results: [],
  sessionStartIndex: 0,  // APP.session.cards 내 LR 블록 시작 인덱스
  mediaRecorder: null,
  recordingChunks: [],
  isRecording: false,
  sttTimeout: null,
  sttAutoCompleted: false
};

// listen-repeat 설정 로드/저장 (localStorage)
function loadLrConfig() {
  if (!APP.config || !APP.config.listenRepeat) return;
  var saved = localStorage.getItem('po_listenRepeat');
  if (saved) {
    try {
      var parsed = JSON.parse(saved);
      Object.assign(APP.config.listenRepeat, parsed);
    } catch(e) {}
  }
}
function saveLrConfig(cfg) {
  localStorage.setItem('po_listenRepeat', JSON.stringify({
    currentLevel: cfg.currentLevel,
    consecutiveL1Success: cfg.consecutiveL1Success,
    consecutiveL3Fallback: cfg.consecutiveL3Fallback
  }));
}

// TTS with speed wrapper
function playTTSWithSpeed(text, lang, speed) {
  return textToSpeech(text, lang, { rate: speed });
}

// 어절별 TTS (B-1)
function lrPlayWord(word) {
  var speed = APP.config.listenRepeat ? APP.config.listenRepeat.ttsSpeed.stage3 : 0.7;
  textToSpeech(word, 'ko', { rate: speed });
}

// 블록 전체 렌더러
function renderListenRepeatBlock() {
  var s = APP.session;
  var idx = s.currentIndex;

  // LR 카드 모으기 (연속된 listen-repeat 카드)
  lrState.cards = [];
  lrState.sessionStartIndex = idx;
  for (var i = idx; i < s.cards.length; i++) {
    if (s.cards[i]._blockType === 'listen-repeat') {
      lrState.cards.push(s.cards[i]);
    } else {
      break;
    }
  }

  if (lrState.cards.length === 0) {
    s.currentIndex++;
    renderCard();
    return;
  }

  lrState.currentIndex = 0;
  lrState.currentStage = 1;
  lrState.results = [];

  // 진행률 업데이트
  document.getElementById('progress-fill').style.width = ((idx / s.cards.length) * 100) + '%';
  document.getElementById('progress-text').textContent = (idx + 1) + '/' + s.cards.length;

  // 과목 전환 메시지
  var transMsg = document.getElementById('transition-msg');
  if (s.prevSubject && s.prevSubject !== 'listen_repeat') {
    transMsg.textContent = '이제 듣고 말하기 해보자!';
    transMsg.style.display = 'block';
    setTimeout(function() { transMsg.style.display = 'none'; }, 2500);
  }
  var lessonProg = document.getElementById('lesson-progress');
  lessonProg.style.display = 'none';
  s.prevSubject = 'listen_repeat';

  // 과목 뱃지
  document.getElementById('subject-badge-area').innerHTML =
    '<span class="subject-badge listen_repeat">듣고 말하기</span>';

  // 블록 HTML 조립
  var container = document.getElementById('card-container');
  var html = '<div class="lr-container">';
  html += '<div class="lr-header">🎧 듣고 말하기 (0/' + lrState.cards.length + ')</div>';
  html += '<div class="lr-list" id="lr-list">';

  for (var j = 0; j < lrState.cards.length; j++) {
    var cls = j === 0 ? 'lr-current' : 'lr-pending';
    html += '<div class="lr-item ' + cls + '" id="lr-item-' + j + '">';
    html += '<span class="lr-text lr-blurred" id="lr-text-' + j + '">' + escapeHtml(lrState.cards[j].text || lrState.cards[j].ttsText) + '</span>';
    if (j === 0) {
      html += '<span class="lr-mic" id="lr-icon-' + j + '">🎤</span>';
    } else {
      html += '<span class="lr-check" id="lr-icon-' + j + '"></span>';
    }
    html += '</div>';
  }

  html += '</div>';
  html += '<div class="lr-feedback" id="lr-feedback"></div>';
  html += '<div class="lr-controls">';
  html += '<button class="lr-btn lr-btn-listen" id="lr-btn-listen" onclick="lrPlayCurrentTTS()">🔊 다시 듣기</button>';
  html += '<button class="lr-btn lr-btn-speak" id="lr-btn-speak" onclick="lrToggleRecording()">🎤 말하기</button>';
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;

  // 피드백 초기화
  var fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';

  // 첫 항목 시작
  lrStartItem(0);
}

// 현재 항목 시작
async function lrStartItem(index) {
  lrState.currentIndex = index;
  lrState.currentStage = 1;

  updateLrUI();

  // 말하기 버튼 비활성화 (TTS 재생 중)
  var btnSpeak = document.getElementById('lr-btn-speak');
  if (btnSpeak) btnSpeak.disabled = true;

  // TTS 재생 (1단계: 보통 속도)
  await lrPlayTTSForStage(1);

  // 녹음 버튼 활성화
  if (btnSpeak) btnSpeak.disabled = false;
}

// UI 업데이트
function updateLrUI() {
  var headerEl = document.querySelector('.lr-header');
  var doneCount = lrState.results.length;
  if (headerEl) headerEl.textContent = '🎧 듣고 말하기 (' + doneCount + '/' + lrState.cards.length + ')';

  for (var i = 0; i < lrState.cards.length; i++) {
    var item = document.getElementById('lr-item-' + i);
    var icon = document.getElementById('lr-icon-' + i);
    if (!item) continue;

    item.className = 'lr-item';
    if (i < lrState.currentIndex || lrState.results.find(function(r) { return r.cardId === lrState.cards[i].cardId; })) {
      item.classList.add('lr-done');
    } else if (i === lrState.currentIndex) {
      item.classList.add('lr-current');
      if (icon) icon.textContent = '🎤';
    } else {
      item.classList.add('lr-pending');
      if (icon) icon.textContent = '';
    }
  }
}

// 블러 해제 (완료 시)
function revealLrItem(index) {
  var textEl = document.getElementById('lr-text-' + index);
  var iconEl = document.getElementById('lr-icon-' + index);
  var itemEl = document.getElementById('lr-item-' + index);
  if (textEl) textEl.classList.remove('lr-blurred');
  if (iconEl) iconEl.textContent = '✅';
  if (itemEl) { itemEl.classList.remove('lr-current', 'lr-pending'); itemEl.classList.add('lr-done'); }
}

// 블러 해제 + 어절 블록 (3단계)
function revealLrItemWithChunks(index) {
  var textEl = document.getElementById('lr-text-' + index);
  var iconEl = document.getElementById('lr-icon-' + index);
  var itemEl = document.getElementById('lr-item-' + index);
  if (!textEl) return;

  var card = lrState.cards[index];
  var text = card.text || card.ttsText || '';
  var words = text.split(/\s+/);
  var chunkHtml = words.map(function(word) {
    return '<span class="lr-word-chunk" onclick="lrPlayWord(\'' + escapeHtml(word).replace(/'/g, "\\'") + '\')">'
      + escapeHtml(word) + '<span class="lr-word-speaker"> 🔊</span></span>';
  }).join('');

  textEl.innerHTML = chunkHtml;
  textEl.classList.remove('lr-blurred');
  if (itemEl) { itemEl.classList.remove('lr-pending'); itemEl.classList.add('lr-current'); }
}

// 단계별 TTS 재생
function lrPlayTTSForStage(stage) {
  var card = lrState.cards[lrState.currentIndex];
  var speed = 1.0;
  if (APP.config && APP.config.listenRepeat && APP.config.listenRepeat.ttsSpeed) {
    speed = APP.config.listenRepeat.ttsSpeed['stage' + stage] || 1.0;
  }
  return playTTSWithSpeed(card.ttsText || card.text, card.ttsLang || 'ko', speed);
}

// 현재 항목 TTS 다시 듣기 버튼
function lrPlayCurrentTTS() {
  lrPlayTTSForStage(lrState.currentStage);
}

// v4.9: LR 자동 완료 (STT 결과 감지 시 자동 종료)
function lrAutoComplete() {
  if (!lrState.isRecording || lrState.sttAutoCompleted) return;
  lrState.sttAutoCompleted = true;
  lrState.isRecording = false;

  if (lrState.sttTimeout) { clearTimeout(lrState.sttTimeout); lrState.sttTimeout = null; }

  if (lrState.mediaRecorder && lrState.mediaRecorder.state === 'recording') {
    lrState.mediaRecorder.stop();
  }
  stopSTT();

  var btnSpeak = document.getElementById('lr-btn-speak');
  if (btnSpeak) { btnSpeak.textContent = '🎤 말하기'; btnSpeak.classList.remove('lr-recording'); }

  setTimeout(function() { lrProcessAttempt(); }, 300);
}

// 녹음 토글
async function lrToggleRecording() {
  var btnSpeak = document.getElementById('lr-btn-speak');

  if (lrState.isRecording) {
    // 녹음 중지
    if (lrState.sttTimeout) { clearTimeout(lrState.sttTimeout); lrState.sttTimeout = null; }
    lrState.isRecording = false;
    if (lrState.mediaRecorder && lrState.mediaRecorder.state === 'recording') {
      lrState.mediaRecorder.stop();
    }
    stopSTT();
    if (btnSpeak) { btnSpeak.textContent = '🎤 말하기'; btnSpeak.classList.remove('lr-recording'); }

    // STT 결과 대기 후 판정
    setTimeout(function() {
      lrProcessAttempt();
    }, 600);
    return;
  }

  // 녹음 시작
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
    });

    lrState.recordingChunks = [];
    var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    lrState.mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

    lrState.mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) lrState.recordingChunks.push(e.data);
    };

    lrState.mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      var blob = new Blob(lrState.recordingChunks, { type: 'audio/webm' });

      // 녹음 저장 (기존 session.recordings에 추가)
      var card = lrState.cards[lrState.currentIndex];
      if (card && APP.session.recordings) {
        blobToBase64(blob).then(function(base64Data) {
          var dateStr = new Date().toISOString().split('T')[0];
          var seqNum = String(APP.session.recordings.length + 1).padStart(2, '0');
          APP.session.recordings.push({
            base64: base64Data,
            filename: dateStr + '_PO_LR_' + (card.cardId || card.id) + '_' + seqNum + '.webm',
            timestamp: new Date().toISOString(),
            activityType: 'LR',
            targetWord: card.ttsText || card.text || '',
            durationSec: 0,
            cardId: card.cardId || card.id,
          });
        }).catch(function() {});
      }
    };

    lrState.mediaRecorder.start();
    lrState.isRecording = true;
    if (btnSpeak) { btnSpeak.textContent = '🎤 듣는 중...'; btnSpeak.classList.add('lr-recording'); }

    // STT 동시 시작 — 자동 완료 콜백 전달
    lrState.sttAutoCompleted = false;  // 리셋
    startSTT('ko-KR', lrAutoComplete);

    // 15초 타임아웃 (무한 대기 방지)
    lrState.sttTimeout = setTimeout(function() {
      console.log('[LR] STT 15초 타임아웃');
      lrAutoComplete();
    }, 15000);

  } catch (e) {
    console.warn('[LR] 마이크 사용 불가:', e);
    var feedbackEl = document.getElementById('lr-feedback');
    if (feedbackEl) feedbackEl.textContent = '마이크를 사용할 수 없어요';
  }
}

// 시도 판정
async function lrProcessAttempt() {
  var card = lrState.cards[lrState.currentIndex];
  var feedbackEl = document.getElementById('lr-feedback');
  var threshold = (APP.config && APP.config.listenRepeat) ? APP.config.listenRepeat.matchThreshold : 0.7;

  // 3단계면 판정 없이 통과 (B-4)
  if (lrState.currentStage === 3) {
    lrOnStage3RecordingDone();
    return;
  }

  // 듣고 말하기용 완화 판정: STT 신뢰도 페널티 무시 + 낮은 임계값
  var result = assessMatchLR(card.ttsText || card.text, sttResult, sttConfidence);

  console.log('[LR판정]', {
    target: card.ttsText || card.text,
    spoken: sttResult,
    sttConf: sttConfidence,
    score: result.score,
    level: result.level,
    stage: lrState.currentStage
  });

  logEvent('lr_attempt', {
    cardId: card.cardId || card.id,
    stage: lrState.currentStage,
    spoken: sttResult,
    matchLevel: result.level,
    matchScore: result.score
  });

  if (result.level === 'match' || result.score >= threshold) {
    // 성공
    // [v4.10 T11] 이중 기준: passed(아이 0.45) + strictPassed(치료 0.7)
    var strictThreshold = 0.7;
    lrState.results.push({
      cardId: card.cardId || card.id,
      reachedStage: lrState.currentStage,
      matchScore: result.score,
      sttTranscript: sttResult,
      passed: true,
      strictPassed: result.score >= strictThreshold
    });

    revealLrItem(lrState.currentIndex);

    if (lrState.currentStage === 1) {
      if (feedbackEl) feedbackEl.textContent = '잘했어! 👏';
    } else {
      if (feedbackEl) feedbackEl.textContent = '두 번째에 해냈어! 💪';
    }

    setTimeout(function() {
      if (feedbackEl) feedbackEl.textContent = '';
      lrAdvance();
    }, 1500);

  } else if (lrState.currentStage === 1) {
    // 1단계 실패 → 2단계
    lrState.currentStage = 2;
    if (feedbackEl) feedbackEl.textContent = '한 번 더 들어볼래?';

    var btnSpeak = document.getElementById('lr-btn-speak');
    if (btnSpeak) btnSpeak.disabled = true;

    await lrPlayTTSForStage(2);

    if (btnSpeak) btnSpeak.disabled = false;
    setTimeout(function() { if (feedbackEl) feedbackEl.textContent = ''; }, 2000);

  } else if (lrState.currentStage === 2) {
    // 2단계 실패 → 3단계
    lrState.currentStage = 3;
    // [v4.10 T11] 이중 기준
    lrState.results.push({
      cardId: card.cardId || card.id,
      reachedStage: 3,
      matchScore: result.score,
      sttTranscript: sttResult,
      passed: result.score >= threshold,
      strictPassed: result.score >= 0.7
    });

    // 블러 해제 + 어절 블록
    revealLrItemWithChunks(lrState.currentIndex);

    if (feedbackEl) feedbackEl.textContent = '같이 읽어보자!';

    var btnSpeak2 = document.getElementById('lr-btn-speak');
    if (btnSpeak2) btnSpeak2.disabled = true;

    await lrPlayTTSForStage(3);

    if (btnSpeak2) btnSpeak2.disabled = false;
  }
}

// 3단계 녹음 완료 콜백 (B-4: assessMatch 호출 금지)
function lrOnStage3RecordingDone() {
  revealLrItem(lrState.currentIndex);
  var feedbackEl = document.getElementById('lr-feedback');
  if (feedbackEl) feedbackEl.textContent = '잘했어!';
  setTimeout(function() {
    if (feedbackEl) feedbackEl.textContent = '';
    lrAdvance();
  }, 1200);
}

// 다음 항목으로 진행
function lrAdvance() {
  // v4.9: 진행률 바 업데이트
  var totalCards = APP.session.cards.length;
  var baseIndex = lrState.sessionStartIndex;
  var completedInBlock = lrState.currentIndex + 1;
  var effectiveIndex = baseIndex + completedInBlock;
  document.getElementById('progress-fill').style.width = ((effectiveIndex / totalCards) * 100) + '%';
  document.getElementById('progress-text').textContent = effectiveIndex + '/' + totalCards;

  if (lrState.currentIndex < lrState.cards.length - 1) {
    lrStartItem(lrState.currentIndex + 1);
  } else {
    // 블록 완료
    adjustLrLevel();

    // 세션 인덱스를 LR 블록 끝으로 이동
    APP.session.currentIndex = lrState.sessionStartIndex + lrState.cards.length;
    renderCard();
  }
}

// 난이도 자동 조절
function adjustLrLevel() {
  var cfg = APP.config && APP.config.listenRepeat;
  if (!cfg) return;

  var results = lrState.results;
  var l1Successes = results.filter(function(r) { return r.reachedStage === 1; }).length;
  var l3Fallbacks = results.filter(function(r) { return r.reachedStage === 3; }).length;

  if (l1Successes === results.length) {
    cfg.consecutiveL1Success++;
    cfg.consecutiveL3Fallback = 0;
  } else if (l3Fallbacks >= 2) {
    cfg.consecutiveL3Fallback++;
    cfg.consecutiveL1Success = 0;
  } else {
    cfg.consecutiveL1Success = 0;
    cfg.consecutiveL3Fallback = 0;
  }

  // 승급
  if (cfg.consecutiveL1Success >= cfg.levelUpThreshold) {
    cfg.currentLevel = Math.min(4, cfg.currentLevel + 1);
    cfg.consecutiveL1Success = 0;
  }
  // 강등
  if (cfg.consecutiveL3Fallback >= cfg.levelDownThreshold) {
    cfg.currentLevel = Math.max(1, cfg.currentLevel - 1);
    cfg.consecutiveL3Fallback = 0;
  }

  saveLrConfig(cfg);

  logEvent('lr_level_adjust', {
    newLevel: cfg.currentLevel,
    l1Successes: l1Successes,
    l3Fallbacks: l3Fallbacks,
    consecutiveL1: cfg.consecutiveL1Success,
    consecutiveL3: cfg.consecutiveL3Fallback
  });
}

// v4.8: 읽기 연습(따라읽기) 블록

// 전역 상태
var raState = {
  cards: [],
  sessionStartIndex: 0,
  currentIndex: 0,
  isRecording: false,
  mediaRecorder: null,
  recordingChunks: [],
  recordingSeconds: 0,
  recordingTimer: null,
  results: []
};

// 블록 전체 렌더러
// [v4.10 T16] 레슨을 chunk로 분할
function chunkLesson(cards, chunkSize) {
  chunkSize = chunkSize || 3;
  var chunks = [];
  for (var i = 0; i < cards.length; i += chunkSize) {
    chunks.push(cards.slice(i, i + chunkSize));
  }
  return chunks;
}

function getReadAloudProgress(lessonId) {
  var all = JSON.parse(localStorage.getItem('po_v4_readAloudProgress') || '{}');
  return all[lessonId] || null;
}

function saveReadAloudProgress(lessonId, progress) {
  var all = JSON.parse(localStorage.getItem('po_v4_readAloudProgress') || '{}');
  all[lessonId] = progress;
  localStorage.setItem('po_v4_readAloudProgress', JSON.stringify(all));
}

function completeChunk(lessonId, chunkIndex, totalChunks) {
  var progress = getReadAloudProgress(lessonId) || {
    chunkIndex: 0, completedChunks: [], lastSessionDate: ''
  };
  if (progress.completedChunks.indexOf(chunkIndex) < 0) {
    progress.completedChunks.push(chunkIndex);
  }
  progress.chunkIndex = chunkIndex + 1;
  progress.lastSessionDate = new Date().toISOString().split('T')[0];
  if (progress.chunkIndex >= totalChunks) {
    progress.chunkIndex = 0; // 리셋: 다음 세션에서 처음부터
    progress.completedChunks = [];
  }
  saveReadAloudProgress(lessonId, progress);
}

function renderReadAloudBlock() {
  var s = APP.session;
  var idx = s.currentIndex;

  // 1. 연속된 read-aloud 카드 수집
  var allRaCards = [];
  raState.sessionStartIndex = idx;
  for (var i = idx; i < s.cards.length; i++) {
    if (s.cards[i]._blockType === 'read-aloud') {
      allRaCards.push(s.cards[i]);
    } else break;
  }
  if (allRaCards.length === 0) { s.currentIndex++; renderCard(); return; }

  // [v4.10 T16] chunk 분할 + 진행률 복원
  var lessonId = allRaCards[0]._lessonId || '';
  var chunks = chunkLesson(allRaCards, 3);
  var progress = lessonId ? getReadAloudProgress(lessonId) : null;
  var currentChunkIdx = (progress && progress.chunkIndex < chunks.length) ? progress.chunkIndex : 0;
  raState.cards = chunks[currentChunkIdx] || chunks[0];
  raState._allRaCards = allRaCards;
  raState._chunks = chunks;
  raState._currentChunkIdx = currentChunkIdx;
  raState._lessonId = lessonId;

  raState.currentIndex = 0;
  raState.results = [];

  // 2. 진행률 + 과목 뱃지 업데이트
  document.getElementById('progress-fill').style.width = ((idx / s.cards.length) * 100) + '%';
  document.getElementById('progress-text').textContent = (idx + 1) + '/' + s.cards.length;

  // 과목 전환 메시지
  var transMsg = document.getElementById('transition-msg');
  if (s.prevSubject && s.prevSubject !== 'speech_therapy') {
    var msg = '이제 따라읽기 해보자!';
    if (raState.cards[0]._lessonTitle) {
      msg += '\n오늘의 따라읽기: ' + raState.cards[0]._lessonTitle;
    }
    transMsg.textContent = msg;
    transMsg.style.display = 'block';
    setTimeout(function() { transMsg.style.display = 'none'; }, 2500);
  }
  var lessonProg = document.getElementById('lesson-progress');
  lessonProg.style.display = 'none';
  s.prevSubject = 'speech_therapy';

  // 과목 뱃지
  var badgeTitle = raState.cards[0]._lessonTitle || '따라읽기';
  document.getElementById('subject-badge-area').innerHTML =
    '<span class="subject-badge speech_therapy">' + escapeHtml(badgeTitle) + '</span>';

  // 3. HTML 조립 — 전체 문장 목록
  var container = document.getElementById('card-container');
  var html = '<div class="ra-container">';
  html += '<div class="ra-header">📖 따라읽기 — ' + escapeHtml(raState.cards[0]._lessonTitle) + ' (0/' + raState.cards.length + ')</div>';
  html += '<div class="ra-list" id="ra-list">';

  for (var j = 0; j < raState.cards.length; j++) {
    var cls = j === 0 ? 'ra-current' : 'ra-pending';
    html += '<div class="ra-item ' + cls + '" id="ra-item-' + j + '">';
    html += '<div class="ra-text" id="ra-text-' + j + '">';

    // 어절 블록으로 분리 (260306 패턴 핵심)
    var text = raState.cards[j].question.ttsText || raState.cards[j].question.displayWord || '';
    var words = text.split(/\s+/);
    words.forEach(function(word) {
      if (word.trim()) {
        html += '<span class="ra-word-chunk">' + escapeHtml(word) + '</span>';
      }
    });

    html += '</div>';
    // 줄별 듣기 버튼
    html += '<button class="ra-play-btn" onclick="raPlayLine(' + j + ')">🔊</button>';
    html += '</div>';
  }

  html += '</div>';  // .ra-list 끝

  // 4. 현재 줄 컨트롤 영역 (녹음 + 도움 계단)
  html += '<div class="ra-controls" id="ra-controls">';
  html += '<div class="ra-feedback" id="ra-feedback"></div>';
  html += '<button class="ra-btn ra-btn-record" id="ra-btn-record" onclick="raToggleRecording()">🎤 읽어보기</button>';
  html += '<button class="ra-btn ra-btn-listen hidden" id="ra-btn-listen" onclick="raHelpStair(1)">한 번 들어볼래?</button>';
  html += '<button class="ra-btn ra-btn-slow hidden" id="ra-btn-slow" onclick="raHelpStair(2)">천천히 들어볼래?</button>';

  // 힌트 (발음 다른 경우만)
  html += '<a class="ra-hint-link hidden" id="ra-hint-link" href="#" onclick="raShowHint(); return false;">힌트 보기</a>';
  html += '<div class="ra-hint hidden" id="ra-hint"></div>';

  html += '<button class="ra-btn-skip" onclick="raSkipLine()">건너뛰기</button>';
  html += '</div>';

  html += '</div>';  // .ra-container 끝
  container.innerHTML = html;

  // 피드백 초기화
  var fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.style.display = 'none';

  // 5. 첫 줄 시작
  raStartLine(0);
}

// 현재 줄 시작
function raStartLine(index) {
  raState.currentIndex = index;
  raUpdateUI();

  var card = raState.cards[index];
  // 관찰 데이터 초기화
  card._observation = {
    helpStairsUsed: [],
    attemptNumber: 0,
    listenCount: 0,
    skipped: false,
    cardStartTime: Date.now(),
    recordingDurations: [],
    sttResults: []
  };
  card._helpStairsUsed = [];
  card._attemptNumber = 0;
  card._consecutiveMismatch = 0;

  // 녹음 버튼 리셋
  var btnRecord = document.getElementById('ra-btn-record');
  if (btnRecord) { btnRecord.textContent = '🎤 읽어보기'; btnRecord.classList.remove('ra-recording'); }

  // 피드백 초기화
  var feedbackEl = document.getElementById('ra-feedback');
  if (feedbackEl) feedbackEl.textContent = '';

  // 힌트 설정
  var hintLink = document.getElementById('ra-hint-link');
  var hintArea = document.getElementById('ra-hint');
  if (card.hint) {
    if (hintLink) hintLink.classList.remove('hidden');
    if (hintArea) { hintArea.textContent = card.hint.text; hintArea.classList.add('hidden'); }
  } else {
    if (hintLink) hintLink.classList.add('hidden');
    if (hintArea) hintArea.classList.add('hidden');
  }

  // 도움 계단 리셋
  document.getElementById('ra-btn-listen').classList.add('hidden');
  document.getElementById('ra-btn-slow').classList.add('hidden');

  // 스크롤 현재 줄로
  var currentItem = document.getElementById('ra-item-' + index);
  if (currentItem) currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// UI 상태 업데이트
function raUpdateUI() {
  // 헤더 카운트 업데이트
  var headerEl = document.querySelector('.ra-header');
  var doneCount = raState.results.length;
  if (headerEl) headerEl.textContent = '📖 따라읽기 — ' + escapeHtml(raState.cards[0]._lessonTitle) + ' (' + doneCount + '/' + raState.cards.length + ')';

  // 줄별 상태 클래스 토글
  for (var i = 0; i < raState.cards.length; i++) {
    var item = document.getElementById('ra-item-' + i);
    if (!item) continue;
    item.className = 'ra-item';
    if (i < raState.currentIndex || raState.results.find(function(r) { return r.index === i; })) {
      item.classList.add('ra-done');
    } else if (i === raState.currentIndex) {
      item.classList.add('ra-current');
    } else {
      item.classList.add('ra-pending');
    }
  }
}

// 녹음 토글
async function raToggleRecording() {
  var btnRecord = document.getElementById('ra-btn-record');

  if (raState.isRecording) {
    // 녹음 중지
    raState.isRecording = false;
    if (raState.mediaRecorder && raState.mediaRecorder.state === 'recording') {
      raState.mediaRecorder.stop();
    }
    stopSTT();
    clearInterval(raState.recordingTimer);
    if (btnRecord) { btnRecord.textContent = '🎤 읽어보기'; btnRecord.classList.remove('ra-recording'); }

    // 녹음 강조 제거
    var currentItem = document.getElementById('ra-item-' + raState.currentIndex);
    if (currentItem) currentItem.classList.remove('ra-recording-active');

    var card = raState.cards[raState.currentIndex];
    if (card && card._observation) {
      card._observation.attemptNumber++;
      card._observation.recordingDurations.push(raState.recordingSeconds);
      card._attemptNumber = card._observation.attemptNumber;
    }

    logEvent('recording_save', { cardId: card ? card.id : null, duration: raState.recordingSeconds });

    // STT 결과 대기 후 판정
    setTimeout(function() {
      var targetText = card.question.ttsText || card.question.displayWord || '';
      var match = assessMatch(targetText, sttResult, sttConfidence);
      var consecutiveMismatch = card._consecutiveMismatch || 0;

      console.log('[RA판정]', {
        target: targetText,
        spoken: sttResult,
        sttConf: sttConfidence,
        score: match.score,
        level: match.level,
        attempt: card._observation ? card._observation.attemptNumber : 1
      });

      // STT 관찰 데이터 기록
      if (card._observation) {
        card._observation.sttResults.push({
          spoken: sttResult,
          confidence: sttConfidence,
          matchLevel: match.level,
          matchScore: match.score
        });
      }

      logEvent('stt_match', {
        cardId: card.id, target: targetText, spoken: sttResult,
        sttConfidence: sttConfidence, matchLevel: match.level,
        matchScore: match.score, attempt: card._observation ? card._observation.attemptNumber : 1
      });

      var feedbackEl = document.getElementById('ra-feedback');

      if (match.level === 'match') {
        // 일치 → 칭찬 + 다음 줄
        card._consecutiveMismatch = 0;
        var praiseTexts = ['잘했어!', '잘 읽었어!', '멋지다!', '대단해!', '좋아!'];
        if (feedbackEl) feedbackEl.textContent = praiseTexts[Math.floor(Math.random() * praiseTexts.length)];

        raState.results.push({ index: raState.currentIndex, matchScore: match.score });
        // [v4.10 T7] 줄별 결과 저장 (성공)
        if (card._lessonId) recordReadAloudLineResult(card._lessonId, raState.currentIndex, true);
        setTimeout(function() {
          if (feedbackEl) feedbackEl.textContent = '';
          raAdvance();
        }, 1500);

      } else if (match.level === 'ambiguous') {
        // 애매함 → 재시도 유도
        consecutiveMismatch++;
        card._consecutiveMismatch = consecutiveMismatch;
        if (feedbackEl) feedbackEl.textContent = '한 번 더 들어보고 천천히 읽어볼까?';
        document.getElementById('ra-btn-listen').classList.remove('hidden');

        if (consecutiveMismatch >= 3) {
          // 3회 도달 → 자동 진행
          card._sttPending = true;
          if (feedbackEl) feedbackEl.textContent = '괜찮아! 다음에 또 해보자.';
          raState.results.push({ index: raState.currentIndex, matchScore: match.score, pending: true });
          // [v4.10 T7] 줄별 결과 저장 (ambiguous 3회 실패)
          if (card._lessonId) recordReadAloudLineResult(card._lessonId, raState.currentIndex, false);
          setTimeout(function() {
            if (feedbackEl) feedbackEl.textContent = '';
            raAdvance();
          }, 2000);
        }

      } else {
        // 불일치
        consecutiveMismatch++;
        card._consecutiveMismatch = consecutiveMismatch;

        if (consecutiveMismatch >= 3) {
          card._sttPending = true;
          if (feedbackEl) feedbackEl.textContent = '괜찮아! 다음에 또 해보자.';
          raState.results.push({ index: raState.currentIndex, matchScore: match.score, pending: true });
          // [v4.10 T7] 줄별 결과 저장 (mismatch 3회 실패)
          if (card._lessonId) recordReadAloudLineResult(card._lessonId, raState.currentIndex, false);
          logEvent('stt_card_pending', {
            cardId: card.id, attempts: card._observation ? card._observation.attemptNumber : 0,
            consecutiveMismatch: consecutiveMismatch
          });
          setTimeout(function() {
            if (feedbackEl) feedbackEl.textContent = '';
            raAdvance();
          }, 2000);
        } else if (consecutiveMismatch === 2) {
          if (feedbackEl) feedbackEl.textContent = '한 번 더 해볼까?';
          document.getElementById('ra-btn-listen').classList.remove('hidden');
          document.getElementById('ra-btn-slow').classList.remove('hidden');
        } else {
          if (feedbackEl) feedbackEl.textContent = '다시 한번 들어볼까?';
          document.getElementById('ra-btn-listen').classList.remove('hidden');
        }
      }
    }, 500);

    return;
  }

  // 녹음 시작
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
    });

    raState.recordingChunks = [];
    raState.recordingSeconds = 0;

    var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    raState.mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

    raState.mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) raState.recordingChunks.push(e.data);
    };

    raState.mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      var blob = new Blob(raState.recordingChunks, { type: 'audio/webm' });

      // 녹음 저장 (기존 session.recordings에 추가)
      var card = raState.cards[raState.currentIndex];
      if (card && APP.session.recordings) {
        blobToBase64(blob).then(function(base64Data) {
          var dateStr = new Date().toISOString().split('T')[0];
          var seqNum = String(APP.session.recordings.length + 1).padStart(2, '0');
          var targetWord = (card.question.ttsText || card.question.displayWord || '').replace(/[^가-힣a-zA-Z0-9]/g, '').substring(0, 20);
          APP.session.recordings.push({
            base64: base64Data,
            filename: dateStr + '_PO_RA_' + targetWord + '_' + seqNum + '.webm',
            timestamp: new Date().toISOString(),
            activityType: 'RA',
            targetWord: card.question.ttsText || card.question.displayWord || '',
            durationSec: raState.recordingSeconds,
            cardId: card.id,
            helpStairsUsed: card._helpStairsUsed || [],
            attemptNumber: card._attemptNumber || 1
          });
        }).catch(function(e) { console.warn('[RA] Base64 변환 실패:', e); });
      }
    };

    raState.mediaRecorder.start();
    raState.isRecording = true;
    if (btnRecord) { btnRecord.textContent = '⏹ 멈추기'; btnRecord.classList.add('ra-recording'); }

    // STT 동시 시작
    var card = raState.cards[raState.currentIndex];
    var sttLang = (card && card.question && card.question.ttsText &&
      /^[a-zA-Z\s.,!?'"]+$/.test(card.question.ttsText)) ? 'en-US' : 'ko-KR';
    startSTT(sttLang);

    raState.recordingTimer = setInterval(function() {
      raState.recordingSeconds++;
      var feedbackEl = document.getElementById('ra-feedback');
      if (feedbackEl) feedbackEl.textContent = '🔴 녹음 중... ' + raState.recordingSeconds + '초';
    }, 1000);

    // 현재 줄 빨간 테두리 강조
    var currentItem = document.getElementById('ra-item-' + raState.currentIndex);
    if (currentItem) currentItem.classList.add('ra-recording-active');

  } catch (e) {
    console.warn('[RA] 마이크 사용 불가:', e);
    var feedbackEl = document.getElementById('ra-feedback');
    if (feedbackEl) feedbackEl.textContent = '마이크를 사용할 수 없어요';
  }
}

// 도움 계단
async function raHelpStair(step) {
  var card = raState.cards[raState.currentIndex];
  if (!card) return;

  var text = card.question.ttsText || card.question.displayWord || '';

  if (step === 1) {
    // 일반 속도 TTS
    if (card._observation) {
      card._observation.helpStairsUsed.push(1);
      card._observation.listenCount++;
      card._helpStairsUsed = card._observation.helpStairsUsed.slice();
    }
    logEvent('help_stair_used', { cardId: card.id, step: 1 });

    APP.ttsPlaying = true;
    try { await textToSpeech(text, 'ko'); } finally { APP.ttsPlaying = false; }

    // Step 2 버튼 표시
    document.getElementById('ra-btn-slow').classList.remove('hidden');

  } else if (step === 2) {
    // 느린 속도 TTS
    var slowRate = (APP.config && APP.config.helpStairs) ? APP.config.helpStairs.slowTTSRate : 0.7;
    if (card._observation) {
      card._observation.helpStairsUsed.push(2);
      card._observation.listenCount++;
      card._helpStairsUsed = card._observation.helpStairsUsed.slice();
    }
    logEvent('help_stair_used', { cardId: card.id, step: 2 });

    APP.ttsPlaying = true;
    try { await textToSpeech(text, 'ko', { rate: slowRate }); } finally { APP.ttsPlaying = false; }
  }
}

// 줄별 TTS 재생
function raPlayLine(index) {
  var card = raState.cards[index];
  var text = card.question.ttsText || card.question.displayWord || '';
  textToSpeech(text, 'ko');

  if (card._observation) card._observation.listenCount++;
}

// 건너뛰기
function raSkipLine() {
  // 녹음 중이면 중지
  if (raState.isRecording) {
    raState.isRecording = false;
    if (raState.mediaRecorder && raState.mediaRecorder.state === 'recording') {
      raState.mediaRecorder.stop();
    }
    stopSTT();
    clearInterval(raState.recordingTimer);
  }

  var card = raState.cards[raState.currentIndex];
  if (card._observation) card._observation.skipped = true;

  raState.results.push({ index: raState.currentIndex, skipped: true });
  // [v4.10 T7] 줄별 결과 저장 (스킵)
  if (card._lessonId) recordReadAloudLineResult(card._lessonId, raState.currentIndex, false);
  raAdvance();
}

// 힌트 보기
function raShowHint() {
  var hintArea = document.getElementById('ra-hint');
  if (hintArea) hintArea.classList.toggle('hidden');
}

// 다음 줄 / 블록 완료
function raAdvance() {
  // 현재 줄 관찰 로그
  var card = raState.cards[raState.currentIndex];
  if (card && card._observation) {
    logEvent('observation_complete', {
      cardId: card.id,
      helpStairs: card._observation.helpStairsUsed,
      attempts: card._observation.attemptNumber,
      listens: card._observation.listenCount,
      skipped: card._observation.skipped,
      timeOnCard: Math.round((Date.now() - card._observation.cardStartTime) / 1000),
      recordingDurations: card._observation.recordingDurations,
      sttResults: card._observation.sttResults
    });
  }

  // v4.9: 진행률 바 업데이트
  var totalCards = APP.session.cards.length;
  var baseIndex = raState.sessionStartIndex;
  var completedInBlock = raState.currentIndex + 1;
  var effectiveIndex = baseIndex + completedInBlock;
  document.getElementById('progress-fill').style.width = ((effectiveIndex / totalCards) * 100) + '%';
  document.getElementById('progress-text').textContent = effectiveIndex + '/' + totalCards;

  if (raState.currentIndex < raState.cards.length - 1) {
    raStartLine(raState.currentIndex + 1);
  } else {
    // [v4.10 T16] chunk 완료 → 진행률 저장
    if (raState._lessonId && raState._chunks) {
      completeChunk(raState._lessonId, raState._currentChunkIdx, raState._chunks.length);
    }
    // 블록 완료 → 세션 인덱스 이동 (전체 RA 카드 길이만큼)
    APP.session.currentIndex = raState.sessionStartIndex + (raState._allRaCards || raState.cards).length;
    renderCard();
  }
}

// ===================================================================
// 도움 계단 (Help Stairs) — v4.3
// ===================================================================

async function helpStair(step) {
  var card = APP.session.cards[APP.session.currentIndex];
  if (!card) return;

  if (step === 1) {
    // Step 1: 일반 속도 TTS
    var btnListen = document.getElementById('btn-listen');
    if (btnListen) btnListen.classList.add('used');

    if (card._observation) {
      card._observation.helpStairsUsed.push(1);
      card._observation.listenCount++;
      card._helpStairsUsed = card._observation.helpStairsUsed.slice();
    }
    logEvent('help_stair_used', {
      cardId: card.id, step: 1,
      listenCount: card._observation ? card._observation.listenCount : 1
    });

    // TTS 재생
    var text = card.question.ttsText || card.question.displayWord || card.question.text;
    var lang = 'ko';
    APP.ttsPlaying = true;
    try {
      await textToSpeech(text, lang);
    } finally {
      APP.ttsPlaying = false;
    }

    // Step 1 완료 후 Step 2 버튼 표시
    var btnSlow = document.getElementById('btn-slow');
    if (btnSlow) btnSlow.classList.remove('hidden');

  } else if (step === 2) {
    // Step 2: 느린 속도 TTS + 하이라이트
    var btnSlow2 = document.getElementById('btn-slow');
    if (btnSlow2) btnSlow2.classList.add('used');

    if (card._observation) {
      card._observation.helpStairsUsed.push(2);
      card._observation.listenCount++;
      card._helpStairsUsed = card._observation.helpStairsUsed.slice();
    }
    logEvent('help_stair_used', {
      cardId: card.id, step: 2,
      listenCount: card._observation ? card._observation.listenCount : 1
    });

    // 단어별 하이라이트 준비
    var displayTextEl = document.querySelector('.help-stairs .display-text')
      || document.querySelector('.display-text');
    var originalText = card.question.ttsText || card.question.displayWord || card.question.text;
    var words = originalText.split(/\s+/);

    if (displayTextEl && words.length > 1) {
      displayTextEl.innerHTML = words.map(function(w, i) {
        return '<span class="word-highlight" data-idx="' + i + '">' + escapeHtml(w) + '</span>';
      }).join(' ');

      // 단어 순차 하이라이트 (타이밍 기반)
      var totalDuration = words.length * 600;  // 느린 속도 기준 단어당 ~600ms
      var interval = totalDuration / words.length;
      var hlIdx = 0;
      var hlTimer = setInterval(function() {
        displayTextEl.querySelectorAll('.word-highlight').forEach(function(el) {
          el.classList.remove('active');
        });
        var activeEl = displayTextEl.querySelector('[data-idx="' + hlIdx + '"]');
        if (activeEl) activeEl.classList.add('active');
        hlIdx++;
        if (hlIdx >= words.length) clearInterval(hlTimer);
      }, interval);
    }

    // 느린 TTS 재생 (0.7x)
    var text2 = card.question.ttsText || card.question.displayWord || card.question.text;
    APP.ttsPlaying = true;
    try {
      await textToSpeech(text2, 'ko', { rate: 0.7 });
    } finally {
      APP.ttsPlaying = false;
      // 하이라이트 정리
      if (displayTextEl) {
        displayTextEl.querySelectorAll('.word-highlight').forEach(function(el) {
          el.classList.remove('active');
        });
      }
    }
  }
}

function retryRecording() {
  var card = APP.session.cards[APP.session.currentIndex];
  if (!card) return;

  if (card._observation) {
    card._observation.attemptNumber++;
    card._attemptNumber = card._observation.attemptNumber;
  }
  logEvent('recording_retry', {
    cardId: card.id,
    attempt: card._observation ? card._observation.attemptNumber : 1
  });

  // 재시도 버튼 숨기고 녹음 버튼 활성화
  var btnRetry = document.getElementById('btn-retry');
  if (btnRetry) btnRetry.classList.add('hidden');

  if (btnRecord) btnRecord.style.display = '';

  // 피드백 숨기기
  var feedbackEl = document.getElementById('recording-feedback');
  if (feedbackEl) feedbackEl.classList.add('hidden');

  var status = document.getElementById('recording-status');
  if (status) status.textContent = '다시 한번 읽어볼까!';
}

function blobToBase64(blob) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function deriveProficiency(rec) {
  var stairs = rec.helpStairsUsed || [];
  var attempts = rec.attemptNumber || 1;
  if (attempts <= 1 && stairs.length === 0) return 'first_try_success';
  if (attempts <= 1 && stairs.length > 0)   return 'hesitation';
  if (attempts >= 2 && attempts <= 3)        return 'retry_success';
  return 'persistent_confusion';
}

async function uploadRecordings() {
  console.log('[PO] uploadRecordings 호출');
  var debugInfo = { step: 'init', recCount: 0, base64Counts: [], payloadSize: 0, error: null };

  try {
    console.log('[PO] recordings 수:', APP.session.recordings ? APP.session.recordings.length : 0);
    if (!APP.session.recordings || APP.session.recordings.length === 0) {
      debugInfo.step = 'no_recordings';
      console.log('[PO] 업로드할 녹음 없음');
      await sendRecordingDebugLog(debugInfo);
      return;
    }

    debugInfo.recCount = APP.session.recordings.length;

    // ★ 디버그: 각 녹음 상태 출력
    APP.session.recordings.forEach(function(r, i) {
      var len = r.base64 ? r.base64.length : 0;
      debugInfo.base64Counts.push(len);
      console.log('[PO] 녹음 ' + i + ': base64=' + (len > 0 ? len + '자' : 'null') + ', file=' + r.filename);
    });

    var s = getSettings();
    if (!s.sheetsUrl) {
      debugInfo.step = 'no_sheetsUrl';
      console.warn('[PO] sheetsUrl 미설정, 녹음 업로드 건너뜀');
      return;
    }

    var dateStr = new Date().toISOString().split('T')[0];
    var sessionId = dateStr + '_' + new Date().toTimeString().slice(0, 5).replace(':', '-');

    // ★ 이미 onstop에서 변환된 base64 사용 (Blob 메모리 해제 문제 해결)
    var recordings = [];
    for (var i = 0; i < APP.session.recordings.length; i++) {
      var rec = APP.session.recordings[i];
      if (!rec.base64) {
        console.warn('[PO] 녹음 ' + i + ': base64 데이터 없음, 건너뜀');
        continue;
      }
      recordings.push({
        filename: rec.filename,
        audioBase64: rec.base64,
        timestamp: rec.timestamp,
        activityType: rec.activityType,
        ruleTag: rec.ruleTag,
        targetWord: rec.targetWord,
        sttResult: '',
        proficiencyTag: deriveProficiency(rec),
        isHighlight: false,
        highlightType: '',
        durationSec: rec.durationSec
      });
    }

    if (recordings.length === 0) {
      debugInfo.step = 'all_base64_null';
      console.warn('[PO] 변환된 녹음 0건, 업로드 건너뜀');
      await sendRecordingDebugLog(debugInfo);
      return;
    }

    debugInfo.step = 'sending';

    // ★ v4.4: 1건씩 개별 전송 (대용량 일괄 전송 실패 방지)
    for (var i = 0; i < recordings.length; i++) {
      var payload = {
        type: 'recording_batch',
        date: dateStr,
        sessionId: sessionId,
        recordings: [recordings[i]]
      };

      try {
        var bodyStr = JSON.stringify(payload);
        console.log('[PO] 녹음 ' + (i+1) + '/' + recordings.length + ' 전송, payload:', bodyStr.length, 'bytes');
        await fetch(s.sheetsUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: bodyStr
        });
        console.log('[PO] 녹음 ' + (i+1) + ' 전송 완료');
      } catch (err) {
        console.warn('[PO] 녹음 ' + (i+1) + ' 전송 실패:', err.message);
        debugInfo.error = (debugInfo.error || '') + 'rec' + i + ':' + err.message + '; ';
        var pending = JSON.parse(localStorage.getItem('po_v4_pending_recordings') || '[]');
        pending.push(payload);
        localStorage.setItem('po_v4_pending_recordings', JSON.stringify(pending));
      }
    }

    debugInfo.step = 'done';
    debugInfo.payloadSize = recordings.reduce(function(sum, r) { return sum + (r.audioBase64 ? r.audioBase64.length : 0); }, 0);
    console.log('[PO] 녹음 업로드 완료, 총 ' + recordings.length + '건');

  } catch (outerErr) {
    debugInfo.step = 'outer_error';
    debugInfo.error = outerErr.message;
    console.error('[PO] uploadRecordings 예외:', outerErr);
  }

  // ★ v4.4: 디버그 정보를 Google Sheets에도 기록 (진단용)
  await sendRecordingDebugLog(debugInfo);
}

// ★ v4.4: 녹음 업로드 디버그 로그를 세션로그에 추가 기록
async function sendRecordingDebugLog(debugInfo) {
  try {
    var s = getSettings();
    if (!s.sheetsUrl) return;
    await fetch(s.sheetsUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        type: 'recording_debug',
        date: new Date().toISOString().split('T')[0],
        timestamp: new Date().toISOString(),
        debug: debugInfo
      })
    });
  } catch (_) {}
}

async function retryPendingRecordings() {
  var s = getSettings();
  if (!s.sheetsUrl) return;

  try {
    var pending = JSON.parse(localStorage.getItem('po_v4_pending_recordings') || '[]');
    if (pending.length === 0) return;

    var stillPending = [];
    for (var i = 0; i < pending.length; i++) {
      try {
        await fetch(s.sheetsUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(pending[i])
        });
      } catch (_) {
        stillPending.push(pending[i]);
      }
    }
    localStorage.setItem('po_v4_pending_recordings', JSON.stringify(stillPending));
  } catch (_) {}
}

function buildObservationSummary() {
  var stCards = APP.session.cards.filter(function(c) { return c.subject === 'speech_therapy'; });
  if (stCards.length === 0) return null;

  var solo = 0, helped = 0, skipped = 0;
  var struggles = [];
  var sttMismatchFrequent = [];  // v4.5: STT 불일치 잦음

  stCards.forEach(function(card) {
    var obs = card._observation;
    if (!obs) return;

    if (obs.skipped) {
      skipped++;
    } else if (obs.helpStairsUsed.length === 0 && obs.attemptNumber <= 1) {
      solo++;
    } else {
      helped++;
    }

    // 반복 어려움 판정: 2회 이상 시도 또는 Step 2까지 사용
    if (obs.attemptNumber >= 2 || obs.helpStairsUsed.includes(2)) {
      struggles.push(card.question.ttsText || card.question.displayWord || card.question.text);
    }

    // v4.5: STT 불일치 잦음 판정 (2회 이상 mismatch/ambiguous)
    if (obs.sttResults) {
      var mismatchCount = obs.sttResults.filter(function(r) {
        return r.matchLevel === 'mismatch' || r.matchLevel === 'ambiguous';
      }).length;
      if (mismatchCount >= 2) {
        sttMismatchFrequent.push(card.question.ttsText || card.question.displayWord || card.question.text);
      }
    }
    // _sttPending 마킹된 카드도 포함
    if (card._sttPending) {
      var txt = card.question.ttsText || card.question.displayWord || card.question.text;
      if (sttMismatchFrequent.indexOf(txt) < 0) sttMismatchFrequent.push(txt);
    }
  });

  var summary = {
    total: stCards.length, solo: solo, helped: helped, skipped: skipped,
    struggles: struggles, sttMismatchFrequent: sttMismatchFrequent
  };

  // v4.6: listen-repeat 결과 추가
  var lrResults = lrState.results || [];
  if (lrResults.length > 0) {
    summary.listenRepeat = {
      total: lrResults.length,
      l1Success: lrResults.filter(function(r) { return r.reachedStage === 1; }).length,
      l2Success: lrResults.filter(function(r) { return r.reachedStage === 2; }).length,
      l3Fallback: lrResults.filter(function(r) { return r.reachedStage === 3; }).length,
      currentLevel: APP.config && APP.config.listenRepeat ? APP.config.listenRepeat.currentLevel : 0,
      avgScore: (lrResults.reduce(function(s, r) { return s + r.matchScore; }, 0) / lrResults.length).toFixed(2)
    };
  }

  return summary;
}

function openParentMode() {
  // 5분 이내 재입력 불필요
  var unlocked = sessionStorage.getItem('po_v4_parent_unlocked');
  if (unlocked && (Date.now() - parseInt(unlocked)) < 300000) {
    showParentResult();
    return;
  }
  var pin = localStorage.getItem('po_v4_parent_pin');
  var modal = document.getElementById('pin-modal');
  var title = document.getElementById('pin-title');
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  if (!pin) {
    title.textContent = 'PIN 설정 (4자리)';
  } else {
    title.textContent = '부모 PIN 입력';
  }
  modal.style.display = 'flex';
  document.getElementById('pin-input').focus();
}

function closePinModal() {
  document.getElementById('pin-modal').style.display = 'none';
}

function submitPin() {
  var input = document.getElementById('pin-input').value;
  if (input.length !== 4 || !/^\d{4}$/.test(input)) {
    document.getElementById('pin-error').textContent = '4자리 숫자를 입력하세요';
    return;
  }
  var stored = localStorage.getItem('po_v4_parent_pin');
  if (!stored) {
    localStorage.setItem('po_v4_parent_pin', input);
    sessionStorage.setItem('po_v4_parent_unlocked', String(Date.now()));
    closePinModal();
    showParentResult();
    return;
  }
  if (input === stored) {
    sessionStorage.setItem('po_v4_parent_unlocked', String(Date.now()));
    closePinModal();
    showParentResult();
  } else {
    document.getElementById('pin-error').textContent = 'PIN이 틀렸습니다';
  }
}

  document.getElementById('child-result').style.display = 'none';
  document.getElementById('parent-result').style.display = 'block';
}

function buildChildSummary(roleStats) {
  var anchorData = getAnchorData();
  var anchors = anchorData.anchors || {};
  var lines = [];
  if (roleStats['curriculum-recall'] && roleStats['curriculum-recall'].total > 0) {
    var engAnchor = anchors['school-english'] || '';
    var socAnchor = anchors['school-social'] || '';
    if (engAnchor) {
      lines.push(engAnchor + ' 수업 내용을 다시 봤어');
    } else if (socAnchor) {
      lines.push(socAnchor + ' 수업 내용을 다시 봤어');
    } else {
      lines.push('수업 복습을 했어');
    }
  }
  if (roleStats['reading-transfer'] && roleStats['reading-transfer'].total > 0) {

    lines.push('말하기 연습을 복습했어');
  }
  return lines.length > 0 ? '오늘은 ' + lines.join(', ') + '!' : '';
}

async function endSession() {
  // ★ v4.4: 중복 호출 방지
  if (APP._endSessionCalled) return;
  APP._endSessionCalled = true;

  const s = APP.session;
  const duration = Math.round((Date.now() - s.startTime) / 1000);

  // v4.6: listen-repeat 블록 통계
  var lrResults = lrState.results || [];
  if (lrResults.length > 0) {
    // [v4.10 T11] 이중 기준 집계
    var lrPassedCount = lrResults.filter(function(r) { return r.passed; }).length;
    var lrStrictCount = lrResults.filter(function(r) { return r.strictPassed; }).length;
    s.subjectStats.listen_repeat = {
      total: lrResults.length,
      correct: lrResults.filter(function(r) { return r.reachedStage <= 2; }).length,
      passedRate: lrResults.length > 0 ? Math.round((lrPassedCount / lrResults.length) * 100) : 0,
      strictRate: lrResults.length > 0 ? Math.round((lrStrictCount / lrResults.length) * 100) : 0,
      passedCount: lrPassedCount,
      strictCount: lrStrictCount
    };
    s.totalAttempts += lrResults.length;
    s.correctCount += lrResults.filter(function(r) { return r.reachedStage <= 2; }).length;
  }

  // ★ v4.4: speech_therapy 카드 통계를 먼저 계산 (UI 표시 전에)
  var stRecordingCards = s.cards.filter(function(c) { return c.subject === 'speech_therapy'; });
  if (stRecordingCards.length > 0) {
    var stRecorded = stRecordingCards.filter(function(c) {
      return c._observation && c._observation.attemptNumber > 0;
    }).length;
    var stSkipped = stRecordingCards.filter(function(c) {
      return c._observation && c._observation.skipped;
    }).length;
    s.subjectStats.speech_therapy = {
      total: stRecordingCards.length,
      correct: stRecorded,
      recordings: s.recordings ? s.recordings.length : 0,
      skipped: stSkipped
    };
    s.totalAttempts += stRecordingCards.length;
    s.correctCount += stRecorded;
  }

  var accuracy = s.totalAttempts > 0
    ? Math.round((s.correctCount / s.totalAttempts) * 100) : 0;

  // 통계 표시
  document.getElementById('stat-correct').textContent = s.correctCount + '/' + s.totalAttempts;
  document.getElementById('stat-accuracy').textContent = accuracy + '%';
  document.getElementById('stat-time').textContent =
    duration < 60 ? duration + '초' : Math.floor(duration / 60) + '분 ' + (duration % 60) + '초';

  // 연속 학습일 업데이트
  updateStreak();
  document.getElementById('stat-streak').textContent = APP.progress.stats.streak + '일';

  // [v4.10 T4] 수행 중심 칭찬 (정답률 미노출)
  var childPraises = [
    '오늘 열심히 했어! 대단해!',
    '어려운 것도 끝까지 해냈네!',
    '오늘도 멋지게 해냈어!',
    '끝까지 집중했어, 최고야!'
  ];
  document.getElementById('complete-message').textContent = childPraises[Math.floor(Math.random() * childPraises.length)];

  // [v4.10 T4] 아이 화면 초기화 (부모 화면 숨기기)
  document.getElementById('child-result').style.display = 'block';
  document.getElementById('parent-result').style.display = 'none';

  // [v4.10 T4] 아이 화면: 과목별 체크마크
  var subjectIcons = { english: '📖 영어', comprehension: '📚 독해', social_studies: '🌍 사회', speech_therapy: '🗣️ 말하기', listen_repeat: '🎧 듣기' };
  var subjectsUsed = {};
  s.cards.forEach(function(c) { if (c.subject) subjectsUsed[c.subject] = true; });
  var checksHtml = '';
  for (var subj in subjectsUsed) {
    checksHtml += '<span style="background:#E8F5E9; padding:6px 12px; border-radius:16px; font-size:14px;">' + (subjectIcons[subj] || subj) + ' ✓</span>';
  }
  document.getElementById('child-subject-checks').innerHTML = checksHtml;

  // 과목별 정답률 (부모 화면용)
  const breakdownEl = document.getElementById('subject-breakdown');
  const subjectLabels = { english: '영어', comprehension: '독해', social_studies: '사회', speech_therapy: '읽기 연습', listen_repeat: '듣고 말하기' };
  let breakdownHtml = '';
  for (const subj in s.subjectStats) {
    const st = s.subjectStats[subj];
    const acc = st.total > 0 ? Math.round((st.correct / st.total) * 100) : 0;
    breakdownHtml += '<div class="subject-stat">'
      + '<span class="label">' + (subjectLabels[subj] || subj) + '</span>'
      + '<span>' + st.correct + '/' + st.total + ' (' + acc + '%)</span>'
      + '</div>';
  }
  // 언어치료 녹음 카드 수
  const stCount = s.cards.filter(function(c) { return c.subject === 'speech_therapy'; }).length;
  if (stCount > 0 && !s.subjectStats.speech_therapy) {
    breakdownHtml += '<div class="subject-stat">'
      + '<span class="label">읽기 연습</span>'
      + '<span>' + stCount + '장 녹음</span>'
      + '</div>';
  }
  breakdownEl.innerHTML = breakdownHtml;

  // v4.3: 관찰 요약 표시
  var obsSummary = buildObservationSummary();
  var obsSummaryEl = document.getElementById('observation-summary');
  if (obsSummaryEl && obsSummary) {
    var obsHtml = '<h3>따라읽기 관찰</h3>';
    obsHtml += '<div class="obs-row"><span>총 문장</span><span>' + obsSummary.total + '문장</span></div>';
    obsHtml += '<div class="obs-row"><span>혼자 성공</span><span>' + obsSummary.solo + '문장</span></div>';
    obsHtml += '<div class="obs-row"><span>도움 후 성공</span><span>' + obsSummary.helped + '문장</span></div>';
    obsHtml += '<div class="obs-row"><span>건너뜀</span><span>' + obsSummary.skipped + '문장</span></div>';
    if (obsSummary.struggles.length > 0) {
      obsHtml += '<div class="obs-row highlight-row"><span>반복 어려움</span><span>'
        + escapeHtml(obsSummary.struggles.join(', ')) + '</span></div>';
    }
    // v4.5: STT 불일치 잦음 (부모 화면용)
    if (obsSummary.sttMismatchFrequent && obsSummary.sttMismatchFrequent.length > 0) {
      obsHtml += '<div class="obs-row highlight-row" style="color:#E74C3C;"><span>STT 불일치 잦음</span><span>'
        + escapeHtml(obsSummary.sttMismatchFrequent.join(', ')) + '</span></div>';
    }
    // v4.6: 듣고 말하기 섹션
    if (obsSummary.listenRepeat) {

      var levelLabels = {1: '~10음절', 2: '11~15음절', 3: '16~20음절', 4: '21음절+'};
