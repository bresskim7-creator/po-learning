function loadAppProgress() {
  const saved = localStorage.getItem('po_v4_progress');
  if (saved) return JSON.parse(saved);
  return {
    stats: { totalSessions: 0, totalCards: 0, totalCorrect: 0, totalTime: 0, streak: 0, lastSessionDate: null },
    subjects: {
      english: { totalCards: 0, mastered: 0, accuracy: 0 },
      comprehension: { totalCards: 0, mastered: 0, accuracy: 0 },
      speech_therapy: { totalRecordings: 0 },
    },
  };
}

function saveAppProgress() {
  localStorage.setItem('po_v4_progress', JSON.stringify(APP.progress));
}

function updateStreak() {
  const p = APP.progress;
  const today = todayStr();
  const last = p.stats.lastSessionDate;

  if (!last) {
    p.stats.streak = 1;
  } else if (last === today) {
    // 오늘 이미 학습함 → streak 유지
  } else if (last === addDays(today, -1)) {
    p.stats.streak++;
  } else {
    p.stats.streak = 1;
  }
  p.stats.lastSessionDate = today;
  saveAppProgress();
}

function updateAppProgress(session, duration, accuracy) {
  const p = APP.progress;
  p.stats.totalSessions++;
  p.stats.totalCards += session.totalAttempts;
  p.stats.totalCorrect += session.correctCount;
  p.stats.totalTime += duration;

  // 과목별 갱신
  for (const subj in session.subjectStats) {
    const ss = session.subjectStats[subj];
    if (!p.subjects[subj]) p.subjects[subj] = { totalCards: 0, mastered: 0, accuracy: 0 };
    p.subjects[subj].totalCards += ss.total;
    const prev = p.subjects[subj];
    prev.accuracy = prev.totalCards > 0
      ? Math.round(((prev.accuracy * (prev.totalCards - ss.total) / 100 + ss.correct) / prev.totalCards) * 100)
      : 0;
  }

  // mastered 카드 수 갱신
  for (const cardId in APP.reviewQueue) {
    if (APP.reviewQueue[cardId].state === 'mastered') {
      // 카드 ID로 과목 판별
      if (cardId.startsWith('eng_')) {
        // count later
      }
    }
  }

  // 간단한 mastered 집계
  let engMastered = 0, compMastered = 0;
  for (const cardId in APP.reviewQueue) {
    if (APP.reviewQueue[cardId].state === 'mastered') {
      if (cardId.startsWith('eng_')) engMastered++;
      else if (cardId.startsWith('comp_')) compMastered++;
    }
  }
  if (p.subjects.english) p.subjects.english.mastered = engMastered;
  if (p.subjects.comprehension) p.subjects.comprehension.mastered = compMastered;

  saveAppProgress();
}

// ===================================================================
// Google Sheets 로그 전송
// ===================================================================

async function syncToGoogleSheets(sessionData) {
  const s = getSettings();
  if (!s.sheetsUrl) return;

  console.log('[PO] syncToGoogleSheets 호출, subjectStats:', JSON.stringify(sessionData.subjectStats));

  try {
    await fetch(s.sheetsUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(sessionData),
      mode: 'no-cors',
    });
    console.log('[PO] Google Sheets 전송 완료');
    // no-cors 모드에서는 응답을 읽을 수 없으므로, 전송 성공으로 간주
    markSessionSynced(sessionData.date);
  } catch (err) {
    console.warn('[PO] Google Sheets 전송 실패:', err);
    savePendingSync(sessionData);
  }
}

function markSessionSynced(date) {
  try {
    const synced = JSON.parse(localStorage.getItem('po_v4_synced') || '[]');
    if (!synced.includes(date)) synced.push(date);
    while (synced.length > 30) synced.shift();
    localStorage.setItem('po_v4_synced', JSON.stringify(synced));
  } catch (_) {}
}

function savePendingSync(sessionData) {
  try {
    const pending = JSON.parse(localStorage.getItem('po_v4_pending_sync') || '[]');
    pending.push(sessionData);
    localStorage.setItem('po_v4_pending_sync', JSON.stringify(pending));
  } catch (_) {}
}

async function retryPendingSync() {
  const s = getSettings();
  if (!s.sheetsUrl) return;

  try {
    const pending = JSON.parse(localStorage.getItem('po_v4_pending_sync') || '[]');
    if (pending.length === 0) return;

    const stillPending = [];
    for (const data of pending) {
      try {
        await fetch(s.sheetsUrl, {
          method: 'POST',
          body: JSON.stringify(data),
          mode: 'no-cors',
        });
        markSessionSynced(data.date);
      } catch (_) {
        stillPending.push(data);
      }
    }
    localStorage.setItem('po_v4_pending_sync', JSON.stringify(stillPending));
  } catch (_) {}
}

// ===================================================================
// 주간 앵커 관리
// ===================================================================

function getCurrentWeek() {
  var d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
  var week1 = new Date(d.getFullYear(), 0, 4);
  var weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
  return d.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
}

function getAnchorData() {
  return JSON.parse(localStorage.getItem('po-anchor-config') || 'null') || {
    weekOf: null,
    anchors: {},
    previousWeek: null
  };
}

function saveAnchorData(data) {
  localStorage.setItem('po-anchor-config', JSON.stringify(data));
}

function getWeekGap(storedWeek) {
  if (!storedWeek) return 99;
  var currentWeek = getCurrentWeek();
  if (storedWeek === currentWeek) return 0;
  // ISO 주차 차이 계산
  var cYear = parseInt(currentWeek.split('-W')[0]);
  var cNum = parseInt(currentWeek.split('-W')[1]);
  var sYear = parseInt(storedWeek.split('-W')[0]);
  var sNum = parseInt(storedWeek.split('-W')[1]);
  return (cYear - sYear) * 52 + (cNum - sNum);
}

function initAnchorUI() {
  var cfg = APP.config && APP.config.anchorConfig;
  var formArea = document.getElementById('anchor-form-area');
  var warningArea = document.getElementById('anchor-warning-area');
  if (!formArea) return;

  // anchorTypes 목록 (config.json에서 또는 기본값)
  var anchorTypes = (cfg && cfg.anchorTypes) || [
    { id: 'speech-therapy', label: '차병원 숙제', inputType: 'text' },
    { id: 'school-english', label: '학교 영어', inputType: 'dropdown', options: ['1단원','2단원','3단원','4단원','5단원','6단원','7단원','8단원','9단원','10단원','11단원','12단원'] },
    { id: 'reading', label: '독서', inputType: 'dropdown_or_text', options: [] }
  ];

  var data = getAnchorData();
  var gap = getWeekGap(data.weekOf);

  // 미입력 경고
  warningArea.innerHTML = '';
  if (gap >= 3) {
    warningArea.innerHTML = '<div class="anchor-warning danger">3주 이상 앵커 미설정! 복습 모드로 전환됩니다. 아래에서 이번 주 앵커를 설정해 주세요.</div>';
  } else if (gap >= 2) {
    warningArea.innerHTML = '<div class="anchor-warning">2주째 앵커 미설정입니다. 이번 주 학습 내용을 입력해 주세요.</div>';
  } else if (gap === 1 && data.weekOf) {
    warningArea.innerHTML = '<div class="anchor-warning">지난주 설정 유지 중. 변경이 필요하면 아래에서 수정하세요.</div>';
  }

  // 현재 주 데이터 (carry forward 적용)
  var currentAnchors = {};
  if (data.weekOf === getCurrentWeek()) {
    currentAnchors = data.anchors || {};
  } else if (gap <= 1 && data.anchors) {
    // 1주 이내 → 지난주 데이터를 기본값으로 표시
    currentAnchors = data.anchors;
  }

  // 폼 렌더링
  var html = '';
  for (var i = 0; i < anchorTypes.length; i++) {
    var at = anchorTypes[i];
    var saved = currentAnchors[at.id] || {};
    html += '<div class="anchor-row">';
    html += '<div class="anchor-label">' + escapeHtml(at.label) + '</div>';

    if (at.inputType === 'text') {
      html += '<input type="text" class="anchor-input" id="anchor-' + at.id + '" '
        + 'value="' + escapeHtml(saved.text || '') + '" '
        + 'placeholder="이번 주 내용 입력">';
    } else if (at.inputType === 'dropdown') {
      html += '<select class="anchor-input" id="anchor-' + at.id + '">';
      html += '<option value="">선택...</option>';
      var opts = at.options || [];
      for (var j = 0; j < opts.length; j++) {
        var sel = (saved.unit === opts[j] || saved.text === opts[j]) ? ' selected' : '';
        html += '<option value="' + escapeHtml(opts[j]) + '"' + sel + '>' + escapeHtml(opts[j]) + '</option>';
      }
      html += '</select>';
    } else if (at.inputType === 'dropdown_or_text') {
      // 옵션이 있으면 드롭다운, 없으면 텍스트
      if (at.options && at.options.length > 0) {
        html += '<select class="anchor-input" id="anchor-' + at.id + '">';
        html += '<option value="">선택...</option>';
        for (var k = 0; k < at.options.length; k++) {
          var sel2 = (saved.chapter === at.options[k] || saved.text === at.options[k]) ? ' selected' : '';
          html += '<option value="' + escapeHtml(at.options[k]) + '"' + sel2 + '>' + escapeHtml(at.options[k]) + '</option>';
        }
        html += '</select>';
      } else {
        html += '<input type="text" class="anchor-input" id="anchor-' + at.id + '" '
          + 'value="' + escapeHtml(saved.chapter || saved.text || '') + '" '
          + 'placeholder="챕터 또는 주제 입력">';
      }
    }

    if (saved.updatedAt) {
      html += '<div class="anchor-status">마지막 설정: ' + saved.updatedAt.split('T')[0] + '</div>';
    }
    html += '</div>';
  }
  formArea.innerHTML = html;
}

function saveAnchors() {
  var cfg = APP.config && APP.config.anchorConfig;
  var anchorTypes = (cfg && cfg.anchorTypes) || [
    { id: 'speech-therapy', inputType: 'text' },
    { id: 'school-english', inputType: 'dropdown' },
    { id: 'reading', inputType: 'dropdown_or_text' }
  ];

  var data = getAnchorData();
  var now = new Date().toISOString();
  var currentWeek = getCurrentWeek();

  // 기존 데이터를 previousWeek으로 이동
  if (data.weekOf && data.weekOf !== currentWeek) {
    data.previousWeek = { weekOf: data.weekOf, anchors: data.anchors };
  }

  data.weekOf = currentWeek;
  data.anchors = {};

  for (var i = 0; i < anchorTypes.length; i++) {
    var at = anchorTypes[i];
    var el = document.getElementById('anchor-' + at.id);
    if (!el) continue;
    var val = el.value.trim();
    if (!val) continue;

    var entry = { updatedAt: now };
    if (at.inputType === 'text') {
      entry.text = val;
    } else if (at.inputType === 'dropdown') {
      entry.unit = val;
    } else {
      entry.chapter = val;
    }
    data.anchors[at.id] = entry;
  }

  saveAnchorData(data);
  initAnchorUI(); // 경고 갱신
}

function carryForwardAnchors() {
  var data = getAnchorData();
  var prev = data.previousWeek;

  // previousWeek이 없으면 현재 anchors를 그대로 현재 주로 갱신
  var sourceAnchors = (prev && prev.anchors) || data.anchors || {};
  if (!sourceAnchors || Object.keys(sourceAnchors).length === 0) {
    return; // 복사할 데이터 없음
  }

  var now = new Date().toISOString();
  var currentWeek = getCurrentWeek();

  // 기존을 previousWeek으로
  if (data.weekOf && data.weekOf !== currentWeek) {
    data.previousWeek = { weekOf: data.weekOf, anchors: data.anchors };
  }

  data.weekOf = currentWeek;
  data.anchors = {};
  for (var key in sourceAnchors) {
    data.anchors[key] = Object.assign({}, sourceAnchors[key], { updatedAt: now });
  }

  saveAnchorData(data);
  initAnchorUI();
}

// ===================================================================
// 유틸
// ===================================================================

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
